id = "steam-search"
name = "Steam Search"
bundle_id = "com.graysurf.steam-search"
version = "0.1.0"
script_filter = "script_filter.sh"
action = "action_open.sh"
rust_binary = "steam-cli"
assets = ["src/assets/icon.png"]

[env]
# Optional: two-letter Steam region code used for cc parameter (for example US, JP, TW). Defaults to US.
STEAM_REGION = "US"
# Optional: comma/newline separated Steam region options used by switch rows, preserving configured order.
STEAM_REGION_OPTIONS = "US,JP"
# Optional: UI switch for showing region switch rows in Script Filter output.
# Default off to keep result rows focused.
STEAM_SHOW_REGION_OPTIONS = "0"
# Optional: Steam language parameter mapped to storesearch `l` (for example english, schinese, japanese).
# Default empty means no `l` parameter is sent.
STEAM_LANGUAGE = ""
# Optional: maximum number of results to return. Parsed as integer and clamped by steam-cli.
STEAM_MAX_RESULTS = "10"

[alfred]
min_alfred = "5"
min_macos = "13.0"
