id = "codex-cli"
name = "Codex CLI"
bundle_id = "com.sympoies.codex-cli"
version = "1.2.5"
readme_source = "README.md"
script_filter = "script_filter.sh"
action = "action_open.sh"
assets = ["src/assets/icon.png"]

[env]
# End users normally don't need this because codex-cli is bundled in package/bin.
# Optional absolute path override for runtime debugging/fallback.
CODEX_CLI_BIN = ""
# Auth file used by codex-cli auth/diag commands.
# Resolution order: configured value (this variable) -> inherited env CODEX_AUTH_FILE -> ~/.codex/auth.json.
CODEX_AUTH_FILE = ""
# Optional secret directory override for auth save/use/diag operations.
# Leave empty to auto-fallback to $XDG_CONFIG_HOME/codex_secrets or ~/.config/codex_secrets.
CODEX_SECRET_DIR = ""
# Diag cache TTL (seconds) for cxau/cxd/cxda auto refresh.
# Default 300 seconds (5 minutes). Set 0 to always refresh before render.
CODEX_DIAG_CACHE_TTL_SECONDS = "300"
# Max wait seconds while another process is refreshing the same diag cache mode.
CODEX_DIAG_CACHE_BLOCK_WAIT_SECONDS = "15"

[alfred]
min_alfred = "5"
min_macos = "13.0"
