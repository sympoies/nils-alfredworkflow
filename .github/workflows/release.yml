name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  package:
    runs-on: macos-14
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Install codex-cli for packaging
        run: |
          source scripts/lib/codex_cli_version.sh
          cargo install "${CODEX_CLI_CRATE}" --version "${CODEX_CLI_VERSION}" --locked

      - name: Regenerate third-party licenses artifact
        run: bash scripts/generate-third-party-licenses.sh --write

      - name: Verify third-party licenses artifact
        run: bash scripts/generate-third-party-licenses.sh --check

      - name: Package all workflows
        run: scripts/workflow-pack.sh --all

      - name: Build bundled release archive
        run: |
          set -euo pipefail

          bundle_dir="dist/release-bundles"
          bundle_name="workflows-${GITHUB_REF_NAME}.zip"
          bundle_path="$bundle_dir/$bundle_name"
          standalone_script="scripts/workflow-clear-quarantine-standalone.sh"
          standalone_asset="$bundle_dir/workflow-clear-quarantine-standalone.sh"
          license_source="THIRD_PARTY_LICENSES.md"
          license_asset="$bundle_dir/THIRD_PARTY_LICENSES.md"
          mkdir -p "$bundle_dir"

          bundle_inputs=()
          while IFS= read -r input; do
            bundle_inputs+=("$input")
          done < <(find dist -type f \( -name '*.alfredworkflow' -o -name '*.alfredworkflow.sha256' \) | sort)
          if [[ "${#bundle_inputs[@]}" -eq 0 ]]; then
            echo "error: no workflow artifacts found under dist/"
            exit 1
          fi

          (
            cd dist
            rel_inputs=()
            while IFS= read -r input; do
              rel_inputs+=("$input")
            done < <(find . -type f \( -name '*.alfredworkflow' -o -name '*.alfredworkflow.sha256' \) | sort)
            zip -q -r "../$bundle_path" "${rel_inputs[@]}"
          )

          if command -v shasum >/dev/null 2>&1; then
            shasum -a 256 "$bundle_path" >"$bundle_path.sha256"
          elif command -v sha256sum >/dev/null 2>&1; then
            sha256sum "$bundle_path" >"$bundle_path.sha256"
          fi

          cp "$standalone_script" "$standalone_asset"
          chmod +x "$standalone_asset"
          if command -v shasum >/dev/null 2>&1; then
            shasum -a 256 "$standalone_asset" >"$standalone_asset.sha256"
          elif command -v sha256sum >/dev/null 2>&1; then
            sha256sum "$standalone_asset" >"$standalone_asset.sha256"
          fi

          if [[ ! -f "$license_source" ]]; then
            echo "error: missing required license artifact at repository root: $license_source"
            exit 1
          fi

          cp "$license_source" "$license_asset"
          if command -v shasum >/dev/null 2>&1; then
            shasum -a 256 "$license_asset" >"$license_asset.sha256"
          elif command -v sha256sum >/dev/null 2>&1; then
            sha256sum "$license_asset" >"$license_asset.sha256"
          fi

      - name: Audit release bundle third-party artifacts
        run: |
          bash scripts/ci/release-bundle-third-party-audit.sh \
            --tag "${GITHUB_REF_NAME}" \
            --dist-dir dist/release-bundles

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true
          files: |
            dist/**/*.alfredworkflow
            dist/**/*.alfredworkflow.sha256
            dist/release-bundles/*.zip
            dist/release-bundles/*.zip.sha256
            dist/release-bundles/workflow-clear-quarantine-standalone.sh
            dist/release-bundles/workflow-clear-quarantine-standalone.sh.sha256
            dist/release-bundles/THIRD_PARTY_LICENSES.md
            dist/release-bundles/THIRD_PARTY_LICENSES.md.sha256
