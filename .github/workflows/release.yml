name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  package:
    runs-on: macos-14
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Install ripgrep
        run: |
          if ! command -v rg >/dev/null 2>&1; then
            brew install ripgrep
          fi

      - name: Bootstrap release runtime
        run: bash scripts/ci/ci-bootstrap.sh --context release --install-codex-cli

      - name: Run release package gates
        run: bash scripts/ci/ci-run-gates.sh release-package --tag "${GITHUB_REF_NAME}"

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true
          files: |
            dist/**/*.alfredworkflow
            dist/**/*.alfredworkflow.sha256
            dist/release-bundles/*.zip
            dist/release-bundles/*.zip.sha256
            dist/release-bundles/workflow-clear-quarantine-standalone.sh
            dist/release-bundles/workflow-clear-quarantine-standalone.sh.sha256
            dist/release-bundles/THIRD_PARTY_LICENSES.md
            dist/release-bundles/THIRD_PARTY_LICENSES.md.sha256
            dist/release-bundles/THIRD_PARTY_NOTICES.md
            dist/release-bundles/THIRD_PARTY_NOTICES.md.sha256
